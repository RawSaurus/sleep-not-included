# =============================================================================
# docker-compose.apps.yml  —  Application microservices
#
# Requires infra stack to be running first:
#   docker compose -f docker-compose.infra.yml up -d
#
# Start apps:
#   docker compose -f docker-compose.apps.yml up -d
#
# Build images before starting (from repo root):
#   docker compose -f docker-compose.apps.yml build
# =============================================================================

name: sni_apps

networks:
  sni_backend:
    external: true  #shares the network created by infra

# Common env shared across services
x-spring-common: &spring-common
  restart: unless-stopped
  networks:
    - sni_backend
  environment: &spring-env
    SPRING_PROFILES_ACTIVE: dev
    #Single postgres instance
    PSQL_USERNAME: ${PSQL_USERNAME}
    PSQL_PASSWORD: ${PSQL_PASSWORD}
    PSQL_DB: ${PSQL_DB}
    #Keycloak
    KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
    #RabbitMQ
    SPRING_RABBITMQ_HOST: sni_rabbitmq
    SPRING_RABBITMQ_PORT: 5672
    SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
    SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    #Zipkin tracing
    MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://sni_zipkin:9411/api/v2/spans
    #Eureka
    EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://sni_eureka:8761/eureka
    #JVM prod settings
    JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

services:

  #Config server
  config-server:
    build:
      context: ../config-management
      dockerfile: ../docker/dockerfiles/Dockerfile.config
    image: sni/config-server:latest
    container_name: sni_config_server
    restart: unless-stopped
    networks:
      - sni_backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL: ${CONFIG_GIT_BRANCH:-main}
      SPRING_CLOUD_CONFIG_SERVER_GIT_CLONE_ON_START: "true"
      SPRING_APPLICATION_NAME: config-management
      SERVER_PORT: 8888
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: ${CONFIG_GIT_URI}
      SPRING_CLOUD_CONFIG_SERVER_GIT_USERNAME: ${CONFIG_GIT_USERNAME}
      SPRING_CLOUD_CONFIG_SERVER_GIT_PASSWORD: ${CONFIG_GIT_PASSWORD}
      SPRING_CLOUD_CONFIG_SERVER_GIT_SEARCH_PATHS: ${CONFIG_GIT_SEARCH_PATHS}
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8888/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  #Eureka
  eureka:
    <<: *spring-common
    build:
      context: ../eureka
      dockerfile: ../docker/dockerfiles/Dockerfile.eureka
    image: sni/eureka:latest
    container_name: sni_eureka
    environment:
      <<: *spring-env
      SPRING_APPLICATION_NAME: eureka
      SERVER_PORT: 8761
    ports:
      - "${EUREKA_PORT:-8761}:8761"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  #Gateway
  gateway:
    <<: *spring-common
    build:
      context: ../gateway
      dockerfile: ../docker/dockerfiles/Dockerfile.gateway
    image: sni/gateway:latest
    container_name: sni_gateway
    environment:
      <<: *spring-env
      SPRING_APPLICATION_NAME: gateway
      SERVER_PORT: 8080
      # Override CORS allowed origins
      #TODO set in config
      SNI_CORS_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  #User service
  user-service:
    <<: *spring-common
    build:
      context: ../sleep-not-included.user
      dockerfile: ../docker/dockerfiles/Dockerfile.spring
    image: sni/user-service:latest
    container_name: sni_user_service
    environment:
      <<: *spring-env
      SPRING_APPLICATION_NAME: sleep-not-included-user
      SERVER_PORT: 8081
    depends_on:
      config-server:
        condition: service_healthy
      eureka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  #Build service
  build-service:
    <<: *spring-common
    build:
      context: ../sleep-not-included.build
      dockerfile: ../docker/dockerfiles/Dockerfile.spring
    image: sni/build-service:latest
    container_name: sni_build_service
    environment:
      <<: *spring-env
      SPRING_APPLICATION_NAME: sleep-not-included-build
      SERVER_PORT: 8082
    depends_on:
      config-server:
        condition: service_healthy
      eureka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  #Comment service
  comment-service:
    <<: *spring-common
    build:
      context: ../sleep-not-included.comment
      dockerfile: ../docker/dockerfiles/Dockerfile.spring
    image: sni/comment-service:latest
    container_name: sni_comment_service
    environment:
      <<: *spring-env
      SPRING_APPLICATION_NAME: sleep-not-included-comment
      SERVER_PORT: 8083
    depends_on:
      config-server:
        condition: service_healthy
      eureka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  #Tag service
  tag-service:
    <<: *spring-common
    build:
      context: ../sleep-not-included.tag
      dockerfile: ../docker/dockerfiles/Dockerfile.spring
    image: sni/tag-service:latest
    container_name: sni_tag_service
    environment:
      <<: *spring-env
      SPRING_APPLICATION_NAME: sleep-not-included-tag
      SERVER_PORT: 8084
    depends_on:
      config-server:
        condition: service_healthy
      eureka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384m

  #GameRes service
  gameres-service:
    <<: *spring-common
    build:
      context: ../sleep-not-included.gameres
      dockerfile: ../docker/dockerfiles/Dockerfile.spring
    image: sni/gameres-service:latest
    container_name: sni_gameres_service
    environment:
      <<: *spring-env
      SPRING_APPLICATION_NAME: sleep-not-included-gameres
      SERVER_PORT: 8086
    depends_on:
      config-server:
        condition: service_healthy
      eureka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384m

  #Image service
  image-service:
    <<: *spring-common
    build:
      context: ../sleep-not-included.image
      dockerfile: ../docker/dockerfiles/Dockerfile.spring
    image: sni/image-service:latest
    container_name: sli-image_service
    environment:
      <<: *spring-env
      SPRING_APPLICATION_NAME: sleep-not-included-image
      SERVER_PORT: 8085
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 5MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 102MB
      SERVER_TOMCAT_MAX_HTTP_FORM_POST_SIZE: 107374182
    depends_on:
      config-server:
        condition: service_healthy
      eureka:
        condition: service_healthy
