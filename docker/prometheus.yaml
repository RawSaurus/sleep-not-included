# =============================================================================
# prometheus.yml  —  scrape config for all SNI services
# All Spring Boot services expose /actuator/prometheus
# =============================================================================

global:
  scrape_interval: 1m
  evaluation_interval: 1m

scrape_configs:

  - job_name: sni_gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["sni_gateway:8080"]
        labels:
          application: sln

  - job_name: sni_eureka
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["sni_eureka:8761"]
        labels:
          application: sln

  - job_name: sni_user_service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["sni_user_service:8081"]
        labels:
          application: sln

  - job_name: sni_build_service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["sni_build_service:8082"]
        labels:
          application: sln

  - job_name: sni_comment_service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["sni_comment_service:8083"]
        labels:
          application: sln

  - job_name: sni_tag_service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["sni_tag_service:8084"]
        labels:
          application: sln

  - job_name: sni_image_service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["sni_image_service:8085"]
        labels:
          application: sln

  - job_name: sni_gameres_service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["sni_gameres_service:8086"]
        labels:
          application: sln

  - job_name: sni_keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ["sni_keycloak:8080"]
        labels:
          application: sln

  - job_name: sni_rabbitmq
    static_configs:
      - targets: ["sni_rabbitmq:15692"]
        labels:
          application: sln
