# =============================================================================
# docker-compose.observability.yml  —  Grafana, Loki, Prometheus, Zipkin, Alloy
#
# Start after infra and apps:
#   docker compose -f docker-compose.observability.yml up -d
# =============================================================================

name: sni_observability

networks:
  sni_backend:
    external: true
  loki_internal:
    driver: bridge

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  zipkin_data:

services:

  #Zipkin
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: sni_zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - sni_backend
    environment:
      #TODO Change to DB later
      # STORAGE_TYPE: elasticsearch
      STORAGE_TYPE: mem

  #Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: sni_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - sni_backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Loki log
  loki:
    image: grafana/loki:latest
    container_name: sni_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    networks:
      - sni_backend
      - loki_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  #Grafana Alloy log collector
  alloy:
    image: grafana/alloy:latest
    container_name: sni_alloy
    restart: unless-stopped
    volumes:
      - ./alloy-config.yaml:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    networks:
      - sni_backend
      - loki_internal
    depends_on:
      loki:
        condition: service_healthy

  #Grafana dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: sni_grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USERNAME}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - sni_backend
      - loki_internal
    depends_on:
      - prometheus
      - loki
      - zipkin
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5